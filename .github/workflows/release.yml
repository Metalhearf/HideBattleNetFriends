name: Release

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Check for updates (dry run)
        id: check
        working-directory: _tools
        run: |
          output=$(python release.py 2>&1)
          echo "$output"
          if echo "$output" | grep -q "Already up to date"; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply updates
        if: steps.check.outputs.has_updates == 'true'
        working-directory: _tools
        run: python release.py --apply

      - name: Read new version
        if: steps.check.outputs.has_updates == 'true'
        id: version
        run: |
          version=$(grep '^## Version:' HideBattleNetFriends/HideBattleNetFriends.toc | sed 's/## Version: //')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        if: steps.check.outputs.has_updates == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add HideBattleNetFriends/*.toc
          git commit -m "Update TOC to v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        if: steps.check.outputs.has_updates == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            "HideBattleNetFriends-${{ steps.version.outputs.version }}.zip" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes "Automated TOC update to match latest WoW client interface versions." \
            --latest
